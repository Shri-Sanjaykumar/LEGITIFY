version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: legitify-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password_3dc5c0b
      POSTGRES_DB: legitify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: legitify-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_password_3dc5c0b
      - POSTGRES_DB=legitify
      - SECRET_KEY=SUPER_SECRET_KEY_CHANGE_IN_PRODUCTION_3dc5c0b
      - UPLOAD_DIR=storage/uploads
    depends_on:
      - db
    volumes:
      - .:/workspace
      - upload_storage:/workspace/storage/uploads

volumes:
  postgres_data:
  upload_storage:
